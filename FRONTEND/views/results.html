<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>Results</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <script src="https://kit.fontawesome.com/43d99f2ee9.js" crossorigin="anonymous"></script>
        
        <link rel="stylesheet" href="../assets/std_style.css">

        <link rel="stylesheet" href="../assets/results.css">


    </head>

    <body>
        <header>
            <!-- place navbar here -->


            <nav class="navbar navbar-expand-sm navbar-dark navbar-custom">
                <div class="container-fluid">
                    
                    <a class="navbar-brand d-flex align-items-center" href="home.html">
                        <img src="../assets/musicLogo.png" alt="Logo" class="logo-img-custom"> 
                        <span>Temporal Logo</span>
                    </a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="mynavbar">
                        
                        <div class="mx-auto">
                            <a href="index.html" class="nav-search-btn-only" title="Ir al buscador">
                                <i class="fas fa-search"></i>
                            </a>
                        </div>
                        <div class="d-flex align-items-center rPanel">
                            <a href="user.html" class="me-3 d-flex align-items-center text-decoration-none">
                                <img src="../assets/profilePic.png" alt="Perfil" class="profile-img-custom"> 
                            </a>

                            <button id="logout" class="btn btn-logout-custom" type="button" title="Cerrar sesión" data-bs-toggle="modal" data-bs-target="#ModalLogout">
                                <i class="fas fa-sign-out-alt"></i> 
                            </button>
                        </div>

                    </div>
                </div>
            </nav>


        </header>
        <main>



            <div class="container mt-4 mb-5">
                
                <div class="row justify-content-center mb-4">
                    <div class="col-md-10">
                        <div class="results-banner">
                            <h4 class="results-banner-text">Showing Album results for: 'Word'</h4>
                        </div>
                    </div>
                </div>

                <div class="row justify-content-center">
                    <div class="col-md-10 d-flex flex-column gap-4">

                        <div class="card result-card flex-column flex-md-row position-relative">
                            
                            <div class="result-img-container">
                                <img src="../assets/RTL.jpg" alt="Ride The Lightning" class="result-img">
                            </div>
                            
                            <div class="card-body d-flex flex-column justify-content-between p-4">
                                
                                <div class="result-info">
                                    <h2 class="result-title">
                                        <a href="album.html" class="stretched-link" style="color: inherit; text-decoration: none;">Ride The Lightning</a>
                                    </h2>
                                    <p class="result-artist">Metallica</p>
                                    <p class="result-year">1984</p>
                                </div>
                                
                                <div class="result-rating-section align-self-md-end text-md-end mt-3 mt-md-0">
                                    <div class="result-stars mb-1 d-flex align-items-center justify-content-md-end">
                                        <i class="fa-solid fa-star"></i>
                                        <i class="fa-solid fa-star"></i>
                                        <i class="fa-solid fa-star"></i>
                                        <i class="fa-solid fa-star"></i>
                                        <i class="fa-solid fa-star-half-stroke"></i>
                                        <span class="rating-number">4.2</span>
                                    </div>
                                    <span class="review-count">506 reviews</span>
                                </div>
                                
                            </div>
                        </div>

                    </div>
                </div>
                
            </div>



        </main>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
