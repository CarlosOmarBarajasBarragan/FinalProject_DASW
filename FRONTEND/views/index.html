<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>Index</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <script src="https://kit.fontawesome.com/43d99f2ee9.js" crossorigin="anonymous"></script>
        
        <link rel="stylesheet" href="../assets/std_style.css">

        
        <link rel="stylesheet" href="../assets/index.css">

    </head>

    <body>
        <header>
            <!-- place navbar here -->

            <nav class="navbar navbar-expand-sm navbar-dark navbar-custom">
                <div class="container-fluid">
                    
                    <a class="navbar-brand d-flex align-items-center" href="home.html">
                        <img src="../assets/musicLogo.png" alt="Logo" class="logo-img-custom"> 
                        <span>Temporal Logo</span>
                    </a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="mynavbar">
                        
                        <div class="mx-auto">
                            <a href="index.html" class="nav-search-btn-only" title="Ir al buscador">
                                <i class="fas fa-search"></i>
                            </a>
                        </div>
                        <div class="d-flex align-items-center rPanel">
                            <a href="user.html" class="me-3 d-flex align-items-center text-decoration-none">
                                <img src="../assets/profilePic.png" alt="Perfil" class="profile-img-custom"> 
                            </a>

                            <button id="logout" class="btn btn-logout-custom" type="button" title="Cerrar sesión" data-bs-toggle="modal" data-bs-target="#ModalLogout">
                                <i class="fas fa-sign-out-alt"></i> 
                            </button>
                        </div>

                    </div>
                </div>
            </nav>

        </header>
        <main>


                <div class="container mt-5 mb-5">
                    <div class="row justify-content-center mb-5">
                        <div class="col-md-8 text-center">
                            
                            <form action="results.html" class="d-flex align-items-center">
                                <div class="search-input-container w-100 position-relative">
                                    
                                    <input type="text" name="query" class="form-control search-main-input" placeholder="Search By..." autocomplete="off">
                                    
                                    <button type="submit" class="btn search-submit-btn">
                                        <i class="fa-regular fa-circle-right"></i>
                                    </button>
                                    
                                </div>
                            </form>
                            
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    
                    <div class="col-md-4">
                        <input type="radio" name="categoria" id="cat_artista" class="hidden-radio" value="artista">
                        <label class="card filter-card w-100" for="cat_artista">
                            <div class="card-body">
                                <h3>Artist</h3>
                                <i class="fa-solid fa-guitar fa-4x mb-3"></i>
                            </div>
                        </label>
                    </div>

                    <div class="col-md-4">
                        <input type="radio" name="categoria" id="cat_album" class="hidden-radio" value="album">
                        <label class="card filter-card w-100" for="cat_album">
                            <div class="card-body">
                                <h3>Album</h3>
                                <i class="fa-solid fa-compact-disc fa-4x mb-3"></i>
                            </div>
                        </label>
                    </div>

                    <div class="col-md-4">
                        <input type="radio" name="categoria" id="cat_fecha" class="hidden-radio" value="fecha">
                        <label class="card filter-card w-100" for="cat_fecha">
                            <div class="card-body">
                                <h3>Release</h3>
                                <i class="fa-solid fa-calendar-days fa-4x mb-3"></i>
                                <select class="form-select filter-dropdown mt-2" name="fecha_anio">
                                    <option value="" selected disabled>Select year</option>
                                    <option value="1984">1984</option>
                                    <option value="1991">1991</option>
                                    <option value="2001">2001</option>
                                </select>
                            </div>
                        </label>
                    </div>

                    <div class="col-md-4">
                        <input type="radio" name="categoria" id="cat_calificacion" class="hidden-radio" value="calificacion">
                        <label class="card filter-card w-100" for="cat_calificacion">
                            <div class="card-body">
                                <h3>Rating</h3>
                                
                                <div class="d-flex justify-content-between w-100 px-3 mb-2" style="font-weight: bold; color: #b3b3b3;">
                                    <span>Min: <output id="outMin" style="color: #ff9800;">0</output></span>
                                    <span>Max: <output id="outMax" style="color: #ff9800;">5</output></span>
                                </div>
                                
                                <div class="dual-slider-container w-100 px-3">
                                    <div class="slider-track"></div>
                                    <input type="range" min="0" max="5" step="0.5" value="0" name="rating_min" id="rangeMin" oninput="outMin.value=this.value">
                                    <input type="range" min="0" max="5" step="0.5" value="5" name="rating_max" id="rangeMax" oninput="outMax.value=this.value">
                                </div>
                            </div>
                        </label>
                    </div>

                    <div class="col-md-4">
                        <input type="radio" name="categoria" id="cat_genero" class="hidden-radio" value="genero">
                        <label class="card filter-card w-100" for="cat_genero">
                            <div class="card-body">
                                <h3>Genre</h3>
                                <i class="fa-solid fa-music fa-4x mb-3"></i>
                            </div>
                        </label>
                    </div>

                    <div class="col-md-4">
                        <input type="radio" name="categoria" id="cat_usuario" class="hidden-radio" value="usuario">
                        <label class="card filter-card w-100" for="cat_usuario">
                            <div class="card-body">
                                <h3>User</h3>
                                <i class="fa-solid fa-user fa-4x mb-3"></i>
                            </div>
                        </label>
                    </div>

                </div>
            </div>


        </main>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
