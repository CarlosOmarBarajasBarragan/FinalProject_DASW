<!doctype html>
<html lang="en">
    <head>
        <title>User Profile</title>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />

        <link rel="stylesheet" href="../assets/std_style.css">
        
        <script src="https://kit.fontawesome.com/43d99f2ee9.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="../assets/user_style.css">
        <link rel="stylesheet" href="../assets/std_style.css">

    </head>

    <body class="d-flex flex-column">
        <header>
            <nav class="navbar navbar-expand-sm navbar-dark navbar-custom">
                <div class="container-fluid">
                    <a class="navbar-brand d-flex align-items-center" href="home.html">
                        <img src="../assets/musicLogo.png" alt="Logo" class="logo-img-custom"> 
                        <span>Temporal Logo</span>
                    </a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="mynavbar">
                        <div class="mx-auto">
                            <a href="index.html" class="btn btn-search-custom text-decoration-none" role="button">
                                <i class="fas fa-search me-2"></i>
                                <span>Search</span>
                            </a>
                        </div>

                        <div class="d-flex align-items-center rPanel">
                            <a href="user.html" class="me-3 d-flex align-items-center text-decoration-none">
                                <img src="../assets/profilePic.png" alt="Perfil" class="profile-img-custom"> 
                            </a>

                            <button id="logout" class="btn btn-logout-custom" type="button" title="Cerrar sesión" data-bs-toggle="modal" data-bs-target="#ModalLogout">
                                <i class="fas fa-sign-out-alt"></i> 
                            </button>
                        </div>
                    </div>
                </div>
            </nav>
        </header>

        <main class="py-4 d-flex flex-column flex-grow-1">
            <div class="container-fluid px-4 px-md-5 pb-4 main-wrapper d-flex flex-column flex-grow-1">
                <div class="d-flex flex-column flex-lg-row gap-4 flex-grow-1">
                    
                    <div class="d-flex flex-column flex-shrink-0" style="flex-basis: 30%;">
                        <div class="profile-panel d-flex flex-column flex-grow-1">
                            <ul class="sidebar-menu">
                                <li>
                                    <a href="reviews.html">
                                        <i class="fa-solid fa-comment-medical"></i> My Reviews
                                    </a>
                                </li>
                                <li>
                                    <a href="albums.html">
                                        <i class="fa-solid fa-compact-disc"></i> My Albums
                                    </a>
                                </li>
                                <li>
                                    <a href="artists.html">
                                        <i class="fa-solid fa-drum"></i> My Artists
                                    </a>
                                </li>
                            </ul>
                            
                            <div class="mt-auto pt-5">
                                <button class="btn btn-update w-100 mb-3">Update User Data</button>
                                <button class="btn btn-delete w-100">Delete Account</button>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex flex-column align-items-center flex-grow-1" style="flex-basis: 70%;">
                        
                        <div class="profile-img-wrapper">
                            <img src="../assets/profilepic2.jpg" alt="User Profile" class="profile-img-large">
                            <label class="edit-img-btn" title="Change Profile Picture">
                                <i class="fa-solid fa-pen"></i>
                                <input type="file" style="display: none;" accept="image/*">
                            </label>
                        </div>

                        <div class="profile-panel w-100 mt-2 d-flex flex-column justify-content-center flex-grow-1">
                            <form>
                                <div class="row g-4">
                                    <div class="col-md-6 custom-input-group">
                                        <label class="form-label">Name</label>
                                        <input type="text" class="form-control custom-input" value="Karlos">
                                    </div>
                                    <div class="col-md-6 custom-input-group">
                                        <label class="form-label">Username:</label>
                                        <input type="text" class="form-control custom-input" value="Dorx@gmail.com">
                                    </div>
                                    <div class="col-md-6 custom-input-group">
                                        <label class="form-label">Email:</label>
                                        <input type="email" class="form-control custom-input" value="Dorx@gmail.com">
                                    </div>
                                    <div class="col-md-6 custom-input-group">
                                        <label class="form-label">Password:</label>
                                        <input type="password" class="form-control custom-input" value="12345678">
                                    </div>
                                </div>
                            </form>
                        </div>

                    </div>
                </div>
            </div>
        </main>

        <footer>
        </footer>

        <div class="modal fade" id="ModalLogout" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-sm">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title">Cerrar sesión</h4>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        ¿Seguro que deseas cerrar sesión?
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <a href="./P01_login.html"><button type="button" class="btn btn-primary" data-bs-dismiss="modal">Aceptar</button></a>
                    </div>
                </div>
            </div>
        </div>

        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"
        ></script>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
