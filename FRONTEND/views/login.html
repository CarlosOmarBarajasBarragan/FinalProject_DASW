<!doctype html>
<html lang="en">
    <head>
        <title>Temporal Logo - Access</title>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />

        <link rel="stylesheet" href="../assets/login_style.css">
        <script src="https://kit.fontawesome.com/43d99f2ee9.js" crossorigin="anonymous"></script>
    </head>

    <body>
        <div class="login-container">
            
            <div class="left-panel">
                <h2>Example Image</h2>
            </div>

            <div class="right-panel">
                
                <div id="login-section" class="form-section">
                    <div class="welcome-header">
                        <div class="welcome-logo">
                            <i class="fas fa-music"></i>
                        </div>
                        <div class="welcome-text">
                            <span class="line1">Welcome</span>
                            <span class="line2">back!</span>
                        </div>
                    </div>

                    <form class="login-form" action="home.html">
                        <div class="form-group">
                            <label for="email">Email:</label>
                            <input type="email" id="email" required placeholder="Dorx@gmail.com">
                        </div>

                        <div class="form-group">
                            <label for="password">Password:</label>
                            <input type="password" id="password" required value="........">
                        </div>

                        <div class="button-group">
                            <button type="submit">Log in</button>
                            <button type="button" onclick="toggleForms()">Register</button>
                        </div>
                    </form>
                </div>


                <div id="register-section" class="form-section hidden">
                    <div class="welcome-header">
                        <div class="welcome-logo">
                            <i class="fas fa-user-plus"></i> </div>
                        <div class="welcome-text">
                            <span class="line1">Create</span>
                            <span class="line2">Account!</span>
                        </div>
                    </div>

                    <form class="login-form" action="home.html">
                        <div class="form-group mb-2">
                            <label>Name:</label>
                            <input type="text" required placeholder="Karlos">
                        </div>
                        
                        <div class="form-group mb-2">
                            <label>Username:</label>
                            <input type="text" required placeholder="Dorx">
                        </div>

                        <div class="form-group mb-2">
                            <label>Email:</label>
                            <input type="email" required placeholder="Dorx@gmail.com">
                        </div>

                        <div class="form-group mb-2">
                            <label>Password:</label>
                            <input type="password" required placeholder="••••••••">
                        </div>

                        <div class="form-group">
                            <label>Confirm Password:</label>
                            <input type="password" required placeholder="••••••••">
                        </div>

                        <div class="button-group">
                            <button type="submit">Sign Up</button>
                            <button type="button" onclick="toggleForms()">Back</button>
                        </div>
                    </form>
                </div>

            </div>
        </div>

        <div class="footer-text">
        </div>

        <script src="../controllers/login_controller.js"></script>

        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"
        ></script>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
